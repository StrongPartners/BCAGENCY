name: 📝 Günlük Otomatik SEO Blog Motoru (Gemini Edition)

on:
  # Her gün saat 07:00 UTC (10:00 KKTC)
  schedule:
    - cron: '0 7 * * *'

  # Manuel tetikleme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    name: 10 Yeni Blog Yazısı Üret & İndeksle
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repoyu çek
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 SDK Kurulumu
        run: npm install @google/generative-ai googleapis

      - name: 🤖 Gemini ile 10 Blog Yazısı Üret
        run: node scripts/generate-blog.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 💾 Değişiklikleri Kaydet
        id: commit
        run: |
          git config user.email "seo-bot@bccreative.agency"
          git config user.name "BC SEO Engine"
          git add src/data/blogPosts.js vite.config.js
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Yeni yazı bulunamadı."
          else
            git commit -m "seo: günlük 10 adet zengin içerikli blog yazısı eklendi $(date +'%Y-%m-%d')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 10 yeni yazı sisteme eklendi."
          fi

      - name: 🔑 Google Service Account JSON Hazırla (Secret'tan)
        if: steps.commit.outputs.has_changes == 'true' && env.GOOGLE_INDEXING_JSON != ''
        run: echo "${{ secrets.GOOGLE_INDEXING_JSON }}" > google-service-account.json
        env:
          GOOGLE_INDEXING_JSON: ${{ secrets.GOOGLE_INDEXING_JSON }}

      - name: 🚀 Google Indexing API - Hızlı İndeksleme
        if: steps.commit.outputs.has_changes == 'true' && env.GOOGLE_INDEXING_JSON != ''
        run: node scripts/google-indexing.mjs
        env:
          GOOGLE_INDEXING_JSON: ${{ secrets.GOOGLE_INDEXING_JSON }}
